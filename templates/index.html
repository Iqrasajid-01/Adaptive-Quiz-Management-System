<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaptive Quiz System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="home-page">
    <div class="home-container">
        <div class="home-logo">📚</div>
        
        <h1 class="home-title">Adaptive Quiz System</h1>
        <p class="home-subtitle">Personalized learning that adapts to your skill level</p>
        
        <form action="{{ url_for('start_quiz') }}" method="post">
            <div class="form-group">
                <label class="form-label" for="username">Enter Your Name</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    class="form-input" 
                    placeholder="e.g., John Doe"
                    required 
                    autocomplete="off"
                    autofocus
                >
            </div>
            
            <button type="submit" class="btn btn-primary btn-block btn-lg">
                <span>🚀</span>
                Start Quiz
            </button>
        </form>
    </div>
</body>
</html>
